{% extends "base.html" %}

{% block title %}Add Availability{% endblock %}

{% block content %}

<h2>Add Availability</h2>

<form method="POST">
    {% csrf_token %}

    <label>Select Days</label><br>
    <label><input type="checkbox" name="days" value="0"> Monday</label><br>
    <label><input type="checkbox" name="days" value="1"> Tuesday</label><br>
    <label><input type="checkbox" name="days" value="2"> Wednesday</label><br>
    <label><input type="checkbox" name="days" value="3"> Thursday</label><br>
    <label><input type="checkbox" name="days" value="4"> Friday</label><br>
    <label><input type="checkbox" name="days" value="5"> Saturday</label><br>
    <label><input type="checkbox" name="days" value="6"> Sunday</label><br><br>

    <label>Start Time</label>
    <input type="time" name="start_time" step="1800" required>

    <label>End Time</label>
    <input type="time" name="end_time" step="1800" required>

    <button type="submit" class="btn btn-primary mt-3">Save Availability</button>
</form>

{% endblock %}
